plugins {
    id 'maven-publish'
    id 'java'
    id 'com.gradleup.shadow' version '9.4.1'
}

group = 'fr.freshperf.architect'
version = '2.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-parameters']
    options.release = 21
}

repositories {
    mavenCentral()
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = "sh.fyz"
            artifactId = "architect"
            version = "2.0.0"
            artifact shadowJar // Publish the fat jar instead of the normal jar
        }
    }
}

dependencies {
    implementation "org.hibernate.orm:hibernate-core:6.6.23.Final"
    implementation "com.zaxxer:HikariCP:7.0.2"
    implementation "org.reflections:reflections:0.10.2"
    implementation "jakarta.persistence:jakarta.persistence-api:3.2.0"
    implementation 'redis.clients:jedis:7.4.1'
    implementation 'org.apache.commons:commons-pool2:2.13.1'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.21.2'
    implementation 'io.github.classgraph:classgraph:4.8.184'
    implementation 'org.postgresql:postgresql:42.7.10'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.14.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
    testLogging {
        showStandardStreams = true
    }
}

shadowJar {

    manifest {
        attributes(
            'Main-Class': 'sh.fyz.architect.Architect'
        )
    }
}