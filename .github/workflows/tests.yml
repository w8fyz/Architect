name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: architect
          POSTGRES_PASSWORD: architect
          POSTGRES_DB: architect_test
        ports:
          - 5440:5432
        options: >-
          --health-cmd "pg_isready -U architect"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure Redis password
        run: |
          sudo apt-get install -y redis-tools > /dev/null 2>&1 || true
          redis-cli -h localhost -p 6380 CONFIG SET requirepass architect

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5440
          DB_NAME: architect_test
          DB_USER: architect
          DB_PASS: architect
          REDIS_HOST: localhost
          REDIS_PORT: 6380
          REDIS_PASS: architect
        run: ./gradlew test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7
